<div class="modal fade" id="modalFinance" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content border-0 shadow">
            <div class="modal-header border-0 bg-warning bg-opacity-10 text-dark">
                <h5 class="modal-title fw-bold"><i class="bi bi-car-front-fill text-warning me-2"></i>Angsuran Multi Finance</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form id="form-finance">
                <div class="modal-body p-4">
                    <div class="row g-4 mobile-responsive-text">
                        
                        <!-- Kolom Kiri: Form Input -->
                        <div class="col-12 col-md-6 border-end-md">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Penyedia Pembiayaan (Leasing)</label>
                                <select class="form-select" id="fin-provider" required>
                                    <option value="" disabled selected>Pilih perusahaan finance...</option>
                                    <option value="FIF Group">FIF Group (Astra Finance)</option>
                                    <option value="Adira Finance">Adira Finance</option>
                                    <option value="BAF">BAF (Bussan Auto Finance)</option>
                                    <option value="WOM Finance">WOM Finance</option>
                                </select>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Nomor Kontrak / ID Pelanggan</label>
                                <input type="number" class="form-control p-2.5" id="fin-kontrak" placeholder="Masukkan nomor kontrak" required disabled>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-semibold">Metode Pembayaran</label>
                                <select class="form-select" id="fin-metode" required disabled>
                                    <option value="" disabled selected>Pilih Metode Pembayaran...</option>
                                    <option value="Virtual Account">Virtual Account</option>
                                    <option value="QRIS">QRIS / QR Code</option>
                                    <option value="Kasir">Bayar di Kasir (Alfamart/Indomaret)</option>
                                </select>
                            </div>
                            
                            <input type="hidden" id="fin-nominal-raw">
                        </div>
                        
                        <!-- Kolom Kanan: Tampilan Invoice Instan -->
                        <div class="col-12 col-md-6 d-flex flex-column justify-content-between bg-light bg-opacity-50 rounded p-3">
                            <div>
                                <h6 class="fw-bold mb-3 text-secondary"><i class="bi bi-receipt me-2"></i>Rincian Lembar Angsuran</h6>
                                <div id="fin-detail-invoice" class="mb-3 d-none"></div>
                            </div>
                            
                            <!-- Tempat Kode / Instruksi Bayar -->
                            <div id="fin-instruksi-wrapper" class="mt-2 text-center">
                                <p class="text-muted small m-0">Silakan pilih penyedia finance dan masukkan nomor kontrak angsuran Anda.</p>
                            </div>
                        </div>

                    </div>
                </div>
                <div class="modal-footer border-0 bg-light">
                    <button type="button" class="btn btn-secondary rounded-3" data-bs-dismiss="modal">Batal</button>
                    <button type="submit" class="btn btn-warning text-dark rounded-3 px-4 fw-bold" id="fin-btn-submit" disabled>Konfirmasi Selesai</button>
                </div>
            </form>
        </div>
    </div>
</div>
