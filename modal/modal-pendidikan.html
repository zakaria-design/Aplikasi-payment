<div class="modal fade" id="modalPendidikan" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content border-0 shadow">
            <div class="modal-header border-0 bg-success bg-opacity-10 text-success">
                <h5 class="modal-title fw-bold"><i class="bi bi-mortarboard-fill me-2"></i>Biaya Pendidikan / Kuliah</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form id="form-pendidikan">
                <div class="modal-body p-4">
                    <div class="row g-4 mobile-responsive-text">
                        
                        <div class="col-12 col-md-6 border-end-md">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Institusi Pendidikan</label>
                                <select class="form-select" id="edu-institusi" required>
                                    <option value="" disabled selected>Pilih Sekolah / Universitas...</option>
                                    <option value="Universitas Pamulang">Universitas Pamulang</option>
                                    <option value="SMK Sasmita Jaya">SMK Sasmita Jaya</option>
                                    <option value="Universitas Terbuka">Universitas Terbuka</option>
                                </select>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label fw-semibold">NIM / NISN Mahasiswa</label>
                                <input type="number" class="form-control p-2.5" id="edu-nim" placeholder="Ketik NIM (12 digit)" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-semibold">Pilih Komponen yang Akan Dibayar</label>
                                <select class="form-select" id="edu-item-bayar" required disabled>
                                    <option value="" disabled selected>Masukkan NIM terlebih dahulu...</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-semibold">Metode Pembayaran</label>
                                <select class="form-select" id="edu-metode" required disabled>
                                    <option value="" disabled selected>Pilih Metode Pembayaran...</option>
                                    <option value="Virtual Account">Virtual Account</option>
                                    <option value="QRIS">QRIS / QR Code</option>
                                    <option value="Kasir">Bayar di Kasir (Alfamart/Indomaret)</option>
                                </select>
                            </div>
                            
                            <input type="hidden" id="edu-nominal-fix">
                        </div>
                        
                        <div class="col-12 col-md-6 d-flex flex-column justify-content-between bg-light bg-opacity-50 rounded p-3">
                            <div>
                                <h6 class="fw-bold mb-3 text-secondary"><i class="bi bi-receipt me-2"></i>Rincian Biaya Pendidikan</h6>
                                <div id="edu-detail-tagihan" class="mb-3 d-none"></div>
                            </div>
                            
                            <div id="edu-instruksi-wrapper" class="mt-2 text-center">
                                <p class="text-muted small m-0">Silakan isi data mahasiswa untuk memunculkan detail struktur biaya.</p>
                            </div>
                        </div>

                    </div>
                </div>
                <div class="modal-footer border-0 bg-light">
                    <button type="button" class="btn btn-secondary rounded-3" data-bs-dismiss="modal">Batal</button>
                    <button type="submit" class="btn btn-success rounded-3 px-4 fw-bold" id="edu-btn-submit" disabled>Konfirmasi Selesai</button>
                </div>
            </form>
        </div>
    </div>
</div>
