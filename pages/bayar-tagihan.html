<style>
    .btn-service { cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease, border 0.2s ease; border: 1px solid transparent !important; }
    .btn-service:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.08) !important; border: 1px solid #0ea5e9 !important; }
    .icon-wrapper { width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; border-radius: 16px; }
    .text-xs { font-size: 0.75rem; }
    #btn-qr-scan { transition: all 0.3s ease; }
    #btn-qr-scan:hover { background-color: #0ea5e9 !important; border-color: #0ea5e9 !important; transform: scale(1.03); }
</style>

<script>
    document.getElementById('modalBayarTagihan').addEventListener('show.bs.modal', function (event) {
        // Card yang memicu modal terbuka
        const card = event.relatedTarget;
        // Ambil nama layanan dari atribut data-service
        const serviceName = card.getAttribute('data-service');
        
        // Update isi form di dalam modal
        document.getElementById('modal-service-title').innerText = 'Pembayaran Tagihan ' + serviceName;
        document.getElementById('tagihan-jenis').value = serviceName;
    });

    document.getElementById('btn-qr-scan').addEventListener('click', function() {
        alert('Fitur Kamera QR Code Scanner Simulasi Berhasil Dibuka!');
    });
</script>
