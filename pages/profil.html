<div class="card border-0 rounded-4 shadow-sm mx-auto position-relative" style="max-width: 800px; background: #ffffff;">
    <div class="text-center pt-5 pb-4 rounded-top-4" style="background: linear-gradient(180deg, rgba(13, 110, 253, 0.05) 0%, rgba(255,255,255,0) 100%);">
        <div class="position-relative d-inline-block">
            <div class="bg-light rounded-circle d-flex align-items-center justify-content-center mx-auto shadow-sm" style="width: 100px; height: 100px; border: 3px solid #fff;">
                <i class="bi bi-person-fill text-secondary" style="font-size: 3.5rem;"></i>
            </div>
            <span class="position-absolute bottom-0 end-0 bg-white p-1 rounded-circle shadow-sm d-flex align-items-center justify-content-center" style="width: 30px; height: 30px; cursor: pointer; border: 1px solid #e3e6f0;">
                <i class="bi bi-camera-fill text-primary" style="font-size: 0.85rem;"></i>
            </span>
        </div>
        <h4 class="fw-bold mt-3 mb-1 text-dark" id="prof-nama" style="letter-spacing: -0.5px;">Zakaria</h4>
        <span class="badge bg-light text-primary border border-primary-subtle px-3 py-2 rounded-pill fw-medium" style="font-size: 0.75rem;">Developer & Engineer</span>
    </div>

    <div class="card-body px-4 pb-4 pt-2">
        <form id="form-profil">
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label small fw-semibold text-secondary mb-1">Nama Lengkap</label>
                        <div class="input-group input-group-merge">
                            <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control bg-light border-start-0 ps-0" id="prof-input-nama" required style="font-size: 0.95rem;">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-semibold text-secondary mb-1">Email</label>
                        <div class="input-group input-group-merge">
                            <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-envelope"></i></span>
                            <input type="email" class="form-control bg-light border-start-0 ps-0" id="prof-input-email" required style="font-size: 0.95rem;">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-semibold text-secondary mb-1">No. Handphone</label>
                        <div class="input-group input-group-merge">
                            <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-telephone"></i></span>
                            <input type="tel" class="form-control bg-light border-start-0 ps-0" id="prof-input-nohp" required style="font-size: 0.95rem;">
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label small fw-semibold text-secondary mb-1">Tanggal Lahir</label>
                        <div class="input-group input-group-merge">
                            <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-calendar-event"></i></span>
                            <input type="date" class="form-control bg-light border-start-0 ps-0" id="prof-input-tgllahir" required style="font-size: 0.95rem;">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-semibold text-secondary mb-1">Pengaturan Saldo Simulasi</label>
                        <div class="input-group input-group-merge">
                            <span class="input-group-text bg-light border-end-0 text-muted fw-medium" style="font-size: 0.9rem;">Rp</span>
                            <input type="number" class="form-control bg-light border-start-0 ps-0" id="prof-input-saldo" required style="font-size: 0.95rem;">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-semibold text-secondary mb-1">Alamat</label>
                        <div class="input-group input-group-merge">
                            <span class="input-group-text bg-light border-end-0 text-muted pt-2"><i class="bi bi-geo-alt"></i></span>
                            <textarea class="form-control bg-light border-start-0 ps-0" id="prof-input-alamat" rows="1" required style="font-size: 0.95rem; resize: none; min-height: 38px;"></textarea>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="mt-3">
                <button type="submit" class="btn btn-primary w-100 fw-semibold py-2.5 rounded-3 shadow-sm d-flex align-items-center justify-content-center gap-2" style="transition: all 0.2s ease;">
                    <i class="bi bi-check-circle-fill"></i> Simpan & Reset Saldo
                </button>
            </div>
        </form>
    </div>
</div>

<style>
    .form-control:focus {
        background-color: #fff !important;
        border-color: #86b7fe;
        box-shadow: none;
    }
    .input-group:focus-within .input-group-text {
        border-color: #86b7fe;
        background-color: #fff !important;
    }
    .input-group:focus-within .form-control {
        background-color: #fff !important;
    }
    .btn-primary:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(13, 110, 253, 0.25) !important;
    }
</style>
